# Locust 설정 파일
# 이 파일은 locust 실행 시 기본 설정으로 사용됩니다.

# 웹 UI 설정
web-host = 0.0.0.0
web-port = 8089

# 기본 호스트 (테스트 대상 서버)
host = http://backend-django:8000

# 로그 레벨
logfile = locust.log
loglevel = INFO

# HTML 리포트 생성
html = reports/locust_report.html

# CSV 결과 저장
csv = reports/locust_results

# 실행 시간 (headless 모드에서만 적용)
# run-time = 300s

# 사용자 수 (headless 모드에서만 적용)
# users = 50

# 초당 생성할 사용자 수 (headless 모드에서만 적용)
# spawn-rate = 5

# 태그로 특정 테스트만 실행
# tags = auth,books

# 제외할 태그
# exclude-tags = heavy
