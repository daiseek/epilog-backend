services:
  # MySQL 데이터베이스 서비스 설정
  backend-database:
    image: mysql:8.0
    container_name: backend-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    env_file:
      - ./.env.dev
    ports:
      - "23306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 서비스 설정
  backend-redis:
    image: redis:7.0
    container_name: backend-redis
    ports:
      - "26379:6379"
    networks:
      - backend-net

  # RabbitMQ 서비스 설정
  backend-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: backend-rabbitmq
    ports:
      - "5672:5672" # AMQP 프로토콜 포트
      - "15672:15672" # 관리자 UI 포트
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend-net

  # Django 애플리케이션 서비스 설정
  backend-django:
    image: backend-django
    container_name: backend-django
    build: .
    command: gunicorn config.asgi:application -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --reload
    volumes:
      - .:/backend
      - ./gcp-key.json:/app/gcp-key.json # GCP veo 키 파일 마운트
      # - /home/ubuntu/gcp-key.json:/app/gcp-key.json # GCP veo 키 파일 절대 경로로 마운트
    ports:
      - "28000:8000"
    depends_on:
      backend-database:
        condition: service_healthy
      backend-redis:
        condition: service_started
      backend-rabbitmq:
        condition: service_healthy
    env_file:
      - ./.env.dev
    environment:
      DJANGO_ENV: dev # 개발 환경 설정
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json # voe key 컨테이너 내부 경로
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@backend-rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://backend-redis:6379/0
    networks:
      - backend-net

    # 🐕 개발용
    develop:
      watch:
        - path: .
          target: /backend
          action: sync
        - path: ./requirements.txt
          target: /backend/requirements.txt
          action: rebuild

  # Prometheus 모니터링 서비스 설정
  backend-prometheus:
    image: prom/prometheus:v2.45.6
    container_name: backend-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "29090:9090"
    networks:
      - backend-net

  # Grafana 모니터링 서비스 설정
  backend-grafana:
    image: grafana/grafana:10.4.0
    container_name: backend-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD} # Grafana 관리자 비밀번호
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER} # Grafana 관리자 사용자 이름
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_ROLE} # 익명 사용자의 역할 설정 (Admin, Editor, Viewer 중 선택 가능)
      - GF_INSTALL_PLUGINS=farski-blendstat-panel # Grafana 플러그인 설치 (예: Blendstat 패널)
    env_file:
      - ./.env.dev
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning # Grafana 프로비저닝 (설정)
      - grafana_data:/var/lib/grafana # Grafana 데이터 (대시보드 등)
    ports:
      - "23000:3000" # Grafana는 기본적으로 3000번 포트입니다

    networks:
      - backend-net

  # Celery Worker 서비스 설정
  backend-pushpin:
    image: fanout/pushpin
    container_name: backend-pushpin
    ports:
      - "5561:5561" # GRIP 포트
      - "7999:7999" # HTTP 프록시 포트 (선택 사항)
    networks:
      - backend-net

  # Celery Worker 서비스 설정
  celery-worker:
    build: .
    container_name: backend-celery-worker
    command: celery -A config worker -l info
    volumes:
      - .:/backend
      - ./gcp-key.json:/app/gcp-key.json
    depends_on:
      backend-rabbitmq:
        condition: service_healthy
      backend-redis:
        condition: service_started
      backend-database:
        condition: service_healthy
      backend-pushpin: # Pushpin 서비스 추가
        condition: service_started
    env_file:
      - ./.env.dev
    environment:
      DJANGO_ENV: dev
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@backend-rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://backend-redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY}
      TYPECAST_API_KEY: ${TYPECAST_API_KEY}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION}
      GOOGLE_CLOUD_GCS_BUCKET: ${GOOGLE_CLOUD_GCS_BUCKET}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DB_NAME: ${DB_NAME}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GRAFANA_ROLE: ${GRAFANA_ROLE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - backend-net

# volume 설정
volumes:
  mysql_data:
  grafana_data:

# 컨테이너 네트워크 설정
networks:
  backend-net:
    driver: bridge
