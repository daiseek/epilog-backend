services:
  # MySQL 데이터베이스 서비스 설정
  backend-database:
    image: mysql:8.0
    container_name: backend-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "23306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 서비스 설정
  backend-redis:
    image: redis:7.0
    container_name: backend-redis
    ports:
      - "26379:6379"
    networks:
      - backend-net

  # Django 애플리케이션 서비스 설정
  backend-django:
    image: backend-django
    container_name: backend-django
    build: .
    command: python -m gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload # Gunicorn을 사용하여 Django 애플리케이션 실행
    volumes:
      - .:/backend
      - ./gcp-key.json:/app/gcp-key.json # GCP veo 키 파일 마운트
      # - /home/ubuntu/gcp-key.json:/app/gcp-key.json # GCP veo 키 파일 절대 경로로 마운트
    ports:
      - "28000:8000"
    depends_on:
      backend-database:
        condition: service_healthy
      backend-redis:
        condition: service_started
    env_file:
      - ./.env.dev.prod
    environment:
      DJANGO_ENV: prod # 배포 환경 설정
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-key.json # veo3 key 컨테이너 내부 경로
    networks:
      - backend-net

    # ⭐️ 배포용
    labels:
      - "traefik.enable=true"
      # HTTPS 라우터 설정 (Traefik에서 자동으로 HTTP를 HTTPS로 리다이렉트)
      - "traefik.http.routers.backend-django.rule=Host(`epi-log.site`, `www.epi-log.site`)"
      - "traefik.http.routers.backend-django.entrypoints=websecure"
      - "traefik.http.routers.backend-django.tls=true"
      - "traefik.http.routers.backend-django.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-django.service=backend-django-service"

      # 서비스 포트 설정 - 중요!
      - "traefik.http.services.backend-django-service.loadbalancer.server.port=8000"

      # Loki 로그 수집 설정
      - "logging=promtail"
      - "logging_jobname=django-backend"

  # Prometheus 모니터링 서비스 설정
  backend-prometheus:
    image: prom/prometheus:v2.45.6
    container_name: backend-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    labels:
      - "traefik.enable=false" # 외부 접근 차단 (내부 전용)
      - "logging=promtail"
      - "logging_jobname=containerlogs"

    ports:
      - "29090:9090"
    networks:
      - backend-net

  # Grafana 모니터링 서비스 설정
  backend-grafana:
    image: grafana/grafana:10.4.0
    container_name: backend-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD} # Grafana 관리자 비밀번호
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER} # Grafana 관리자 사용자 이름
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_ROLE} # 익명 사용자의 역할 설정 (Admin, Editor, Viewer 중 선택 가능)
      - GF_INSTALL_PLUGINS=farski-blendstat-panel # Grafana 플러그인 설치 (예: Blendstat 패널)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning # Grafana 프로비저닝 (설정)
      - grafana_data:/var/lib/grafana # Grafana 데이터 (대시보드 등)
    ports:
      - "23000:3000" # Grafana는 기본적으로 3000번 포트입니다
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.epi-log.site`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

      # Loki 로그 수집 설정
      - "logging=promtail"
      - "logging_jobname=grafana"

    networks:
      - backend-net

  traefik:
    image: traefik:v2.9
    container_name: backend-traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--accesslog=true" # 이 라인 추가
      - "--accesslog.filepath=/var/log/traefik/access.log" # (선택 사항) 파일로 저장
      - "--accesslog.format=json" # (선택 사항) JSON 형식으로 로그
      - "--log.level=DEBUG" # 디버그 레벨 로그 (자세한 정보)
      - "--entrypoints.websecure.address=:443" # 중요 - Traefik이 HTTPS 요청을 수신할 포트 443을 열음
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure" # 중요 - HTTP 요청을 HTTPS로 리다이렉트
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https" # 중요 => HTTPS 강제 적용
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true" # 중요 - Let's Encrypt를 사용하여 TLS 인증서를 자동으로 발급받음
      - "--certificatesresolvers.letsencrypt.acme.email=dnjsgml0578@gmail.com" # 중요 - 인증 관련 알림을 받을때 필요, Let's Encrypt에 자동으로 등록됨
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json" # 중요 - 인증서 저장 위치, 해당 경로를 볼륨에 마운팅하여 영구 저장됨
    ports:
      - "80:80"
      - "443:443" # 중요
      - "8090:8090" # Traefik 대시보드 포트
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik-certificates:/letsencrypt # 중요
    labels:
      # Loki 로그 수집 설정
      - "logging=promtail"
      - "logging_jobname=traefik"
    networks:
      - backend-net

  backend-portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "29000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.epi-log.site`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    networks:
      - backend-net

  backend-loki:
    image: grafana/loki:latest
    ports:
      - 23100:3100
    command: -config.file=/etc/loki/local-config.yaml #기본 설정
    labels:
      - "traefik.enable=false" # Traefik에서 제외 (내부 서비스)
    networks:
      - backend-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/docker-config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro #도커 로그
      - /var/run/docker.sock:/var/run/docker.sock #도커 소켓 (디몬)
    command:
      - -config.file=/etc/promtail/docker-config.yaml #설정파일
      # - -config.expand-env=true #환경변수 수집용. 안해도 됩니다.
    labels:
      - "traefik.enable=false" # Traefik에서 제외 (외부 접근 불필요)
    depends_on:
      - backend-loki
    networks:
      - backend-net

  backend-cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: backend-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "28080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.epi-log.site`)"
      - "traefik.http.routers.cadvisor.entrypoints=websecure"
      - "traefik.http.routers.cadvisor.tls=true"
      - "traefik.http.routers.cadvisor.tls.certresolver=letsencrypt"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"

      # Loki 로그 수집 설정
      - "logging=promtail"
      - "logging_jobname=cadvisor"
    networks:
      - backend-net

  backend-node_exporter: #서비스 이름
    image: quay.io/prometheus/node-exporter:v1.8.1 #이미지
    container_name: backend-node_exporter
    ports:
      - "29100:9100" #포트 9100 매핑
    command:
      - "--path.rootfs=/host" #루트 파일 시스템을 볼륨에 설정한 host/로 설정
    restart: unless-stopped #멈추면 다시 시작
    volumes:
      - "/:/host:ro,rslave" #읽기 전용 호스트 머신 데이터 (마운트 정보 포함 - rslave)
    networks:
      - backend-net #같은 네트워크

# volume 설정
volumes:
  mysql_data:
  grafana_data:
  traefik-certificates: # 중요 - Traefik 인증서 저장소
  portainer_data:

# 컨테이너 네트워크 설정
networks:
  backend-net:
    driver: bridge
